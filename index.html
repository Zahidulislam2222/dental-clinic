        .sk{animation:sk-pulse 1.8s ease-in-out infinite}

        .sk-bar{height:36px;background:#0A1628;width:100%}
        .sk-nav{height:64px;background:#fff;border-bottom:1px solid #f1f1f1;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}

        .sk-logo-icon{width:36px;height:40px;border-radius:8px;background:#00BFA6}
        .sk-logo-text{display:flex;flex-direction:column;gap:2px}
        .sk-logo-t1{width:72px;height:14px;border-radius:4px;background:#0A1628}
        .sk-logo-t2{width:90px;height:10px;border-radius:4px;background:#00BFA6;opacity:.5}
        .sk-nav-links{display:flex;gap:12px}
        .sk-nav-link{width:52px;height:12px;border-radius:4px;background:#e5e7eb}
        .sk-btn-cta{width:100px;height:36px;border-radius:8px;background:#00BFA6;opacity:.6}
        .sk-hero{display:flex;align-items:center;justify-content:center;gap:3rem;max-width:1200px;margin:0 auto;padding:5rem 2rem 4rem;min-height:85vh}
        .sk-hero-left{flex:1;display:flex;flex-direction:column;gap:16px}
        .sk-badge{width:200px;height:28px;border-radius:20px;background:#00BFA6;opacity:.12}
        .sk-h1-1{width:90%;height:36px;border-radius:6px;background:#0A1628;opacity:.12}
        .sk-h1-2{width:70%;height:36px;border-radius:6px;background:#0A1628;opacity:.1}
        .sk-p1{width:100%;height:14px;border-radius:4px;background:#9ca3af;opacity:.15;margin-top:8px}
        .sk-p2{width:85%;height:14px;border-radius:4px;background:#9ca3af;opacity:.12}
        .sk-btns{display:flex;gap:12px;margin-top:12px}
        .sk-btn1{width:160px;height:48px;border-radius:12px;background:#00BFA6;opacity:.25}
        .sk-btn2{width:140px;height:48px;border-radius:12px;border:2px solid #e5e7eb;background:transparent;opacity:.3}
        .sk-hero-right{flex-shrink:0}
        .sk-img{width:320px;height:320px;border-radius:24px;background:linear-gradient(135deg,#00BFA6 0%,#0A1628 100%);opacity:.1}
        @media(max-width:768px){
          .sk-hero{flex-direction:column;padding:3rem 1.5rem;gap:2rem;min-height:auto}
          .sk-nav-links,.sk-btn-cta{display:none}
          .sk-img{width:240px;height:240px}
          .sk-nav{padding:0 1rem}
        }
